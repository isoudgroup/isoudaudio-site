name: Submit sitemap to Google

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  submit-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Wait for Cloudflare Pages deployment
        run: sleep 180

      - name: Submit sitemap to Google Search Console
        run: npm run submit:sitemap
        env:
          GOOGLE_CLIENT_EMAIL: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          SITEMAP_URL: https://isoudaudio.com/sitemap.xml
